<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Product Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="logo">MyShop</div>

        <!-- Hamburger Mobile -->
        <div class="hamburger">☰</div>

        <!-- Navigation Desktop -->
        <nav class="nav">
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- MAIN LAYOUT -->
    <div class="container">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <h3>Filters</h3>

            <select>
                <option>Category</option>
                <option>Shoes</option>
                <option>Clothes</option>
                <option>Accessories</option>
            </select>
        </aside>

        <!-- PRODUCT GRID -->
        <main class="products">

            <div class="card">
                <img src="https://via.placeholder.com/300x200" alt="">
                <h3>Product 1</h3>
                <p>$20</p>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/300x200" alt="">
                <h3>Product 2</h3>
                <p>$25</p>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/300x200" alt="">
                <h3>Product 3</h3>
                <p>$30</p>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/300x200" alt="">
                <h3>Product 4</h3>
                <p>$40</p>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/300x200" alt="">
                <h3>Product 5</h3>
                <p>$22</p>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/300x200" alt="">
                <h3>Product 6</h3>
                <p>$35</p>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/300x200" alt="">
                <h3>Product 7</h3>
                <p>$28</p>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/300x200" alt="">
                <h3>Product 8</h3>
                <p>$50</p>
            </div>

        </main>

        <!-- ADS BAR -->
        <aside class="ads">
            <h3>Ads Bar</h3>
            <p>Advertisement</p>
        </aside>

    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <p>Responsive Product Page</p>
    </footer>

</body>
</html>
