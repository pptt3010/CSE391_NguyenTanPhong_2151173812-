<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi API Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .widget {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            min-height: 180px;
        }

        .loading {
            color: #666;
        }

        .error {
            color: red;
        }

        .success {
            color: green;
        }

        #loadTime {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Multi-API Dashboard</h1>
        <button id="refreshBtn">Refresh All</button>
    </div>

    <div id="globalLoading">Đang tải dữ liệu...</div>

    <div class="dashboard">
        <div class="widget" id="widget-0"></div>
        <div class="widget" id="widget-1"></div>
        <div class="widget" id="widget-2"></div>
    </div>

    <div id="loadTime"></div>

    <script src="app.js"></script>

</body>
</html>
