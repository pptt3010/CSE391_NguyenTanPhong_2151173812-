<!-- form_validator/index.html -->
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Validator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h2>Đăng ký tài khoản</h2>

    <form id="registerForm">

      <div class="form-group">
        <label>Họ tên</label>
        <div class="input-box">
          <input type="text" id="name" placeholder="Nhập họ tên">
          <span id="nameStatus"></span>
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="text" id="email" placeholder="example@gmail.com">
        <small class="error" id="emailError"></small>
      </div>

      <div class="form-group">
        <label>Mật khẩu</label>
        <input type="password" id="password" placeholder="Nhập mật khẩu">

        <div class="strength">
          <div id="strengthBar"></div>
        </div>

        <small id="strengthText"></small>
      </div>

      <div class="form-group">
        <label>Xác nhận mật khẩu</label>
        <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu">
        <small class="error" id="confirmError"></small>
      </div>

      <div class="form-group">
        <label>Số điện thoại</label>
        <input type="text" id="phone" placeholder="0901-234-567">
        <small class="error" id="phoneError"></small>
      </div>

      <button type="submit" id="submitBtn" disabled>
        Đăng ký
      </button>

    </form>
  </div>

  <div class="modal" id="successModal">
    <div class="modal-content">
      <h3>Đăng ký thành công!</h3>

      <p id="userInfo"></p>

      <button id="closeModal">Đóng</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
